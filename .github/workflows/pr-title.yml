# Validates that PR titles follow the Conventional Commits specification.
# This is required for release-please to generate accurate changelogs
# and determine version bumps from squash-merged commit messages.
name: pr-title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            build
            perf
            revert
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "PR title must have a subject after the type/scope prefix."
