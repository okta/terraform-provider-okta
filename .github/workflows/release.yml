# This GitHub action can publish assets for release when a tag is created.
# Currently its setup to run on any tag that matches the pattern "v*" (ie. v0.1.0).
#
# It uses HashiCorp's official reusable workflow for community Terraform providers
# to handle GPG signing and GoReleaser execution.
#
name: release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (e.g., v6.7.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run VCR acceptance tests
        run: time make smoke-test-play-vcr-acc
        timeout-minutes: 30

  goreleaser:
    needs: [smoke-test]
    uses: hashicorp/ghaction-terraform-provider-release/.github/workflows/community.yml@5f388ae147bcc1e1c34822571b2f2de40694c5d6 # v5.0.0
    with:
      setup-go-version-file: "go.mod"
      goreleaser-release-args: "--parallelism 2"
      git-ref: ${{ inputs.tag || github.ref }}
    secrets:
      gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
      gpg-private-key-passphrase: ${{ secrets.PASSPHRASE }}
