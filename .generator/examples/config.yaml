# Example generator config for Okta Terraform Provider
#
# This config references paths in your OpenAPI spec. A single spec can contain
# multiple API "tags" (e.g., Group, User, GovernanceEntitlement). Use `api_tag`
# to tell the generator which SDK client method to call for each resource.
#
# Usage:
#   poetry run python -m generator ../specs/okta-management.yaml ./examples/config.yaml
#
# Required `api_tag` values correspond to the Okta Go SDK API structs, e.g.:
#   GroupAPI → api_tag: "Group"
#   UserAPI  → api_tag: "User"

resources:
  group:
    api_tag: "Group"          # maps to OktaSDKClientV6().GroupAPI
    read:
      method: get
      path: /api/v1/groups/{groupId}
    create:
      method: post
      path: /api/v1/groups
    update:
      method: put
      path: /api/v1/groups/{groupId}
    delete:
      method: delete
      path: /api/v1/groups/{groupId}

  entitlement_bundle:
    api_tag: "GovernanceEntitlement"   # maps to OktaSDKClientV6().GovernanceEntitlementAPI
    read:
      method: get
      path: /governance/api/v1/bundles/{bundleId}
    create:
      method: post
      path: /governance/api/v1/bundles
    update:
      method: put
      path: /governance/api/v1/bundles/{bundleId}
    delete:
      method: delete
      path: /governance/api/v1/bundles/{bundleId}

datasources:
  group:
    api_tag: "Group"
    singular:
      method: get
      path: /api/v1/groups/{groupId}
    plural:
      method: get
      path: /api/v1/groups

  entitlement_bundle:
    api_tag: "GovernanceEntitlement"
    singular:
      method: get
      path: /governance/api/v1/bundles/{bundleId}
    plural:
      method: get
      path: /governance/api/v1/bundles
